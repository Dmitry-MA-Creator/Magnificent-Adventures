<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MA Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ========================= */
/* PRODUCT PAGE STRUCTURE   */
/* ========================= */

.product-page {
  width: 100%;
}

/* ----- SCREEN 1 ----- */

.pdp-hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 40px;
  padding: 60px;
  box-sizing: border-box;
}

.media-column,
.main-media,
.info-column {
  border: 1px solid #ccc;
  padding: 20px;
}

/* ----- SCREEN 2 ----- */

.pdp-description {
  min-height: 100vh;
  padding: 60px;
  box-sizing: border-box;
  border-top: 1px solid #ddd;
}

.description-block,
.specs-block,
.diy-block {
  border: 1px solid #ccc;
  padding: 20px;
  margin-bottom: 40px;
}

/* ----- SCREEN 3 ----- */

.pdp-ecosystem {
  min-height: 50vh;
  padding: 60px;
  box-sizing: border-box;
  border-top: 1px solid #ddd;
}

.transformations,
.attachments,
.parts {
  border: 1px solid #ccc;
  padding: 20px;
  margin-bottom: 30px;
}

/* ----- OVERLAY ----- */

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
}

.overlay-content {
  position: absolute;
  inset: 10%;
  background: white;
}

</style>
</head>

<body>

  <!-- NAV можно скопировать из index -->
  <header class="nav">
    <div class="logo">Magnificent Adventures</div>
  </header>

  <main class="product-page">

    <!-- ========================= -->
    <!-- SCREEN 1 -->
    <!-- ========================= -->
    <section class="pdp-hero">

      <div class="media-column">
        <div class="thumb">Thumbnail 1</div>
        <div class="thumb">Thumbnail 2</div>
        <div class="thumb">Video</div>
      </div>

      <div class="main-media">
        MAIN IMAGE AREA
      </div>

      <div class="info-column">
        <div class="price-block">
          $30
        </div>

        <div class="cta-block">
          <button>Make Order</button>
        </div>

        <div class="download-block">
          Download Drawings
        </div>
      </div>

    </section>


    <!-- ========================= -->
    <!-- SCREEN 2 -->
    <!-- ========================= -->
    <section class="pdp-description">

      <div class="description-block">
        Product Description
      </div>

      <div class="specs-block">
        Technical Specifications
      </div>

      <div class="diy-block">
        DIY Video Section
      </div>

    </section>


    <!-- ========================= -->
    <!-- SCREEN 3 -->
    <!-- ========================= -->
    <section class="pdp-ecosystem">

      <div class="transformations">
        Transformations
      </div>

      <div class="attachments">
        Attachments
      </div>

      <div class="parts">
        Individual Parts
      </div>

    </section>

  </main>


  <!-- Единый Overlay -->
  <div class="overlay">
    <div class="overlay-content"></div>
  </div>


  <footer>
    © 2026 Magnificent Adventures
  </footer>

</body>
</html>
